<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Archive of Decrees</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📜</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --parchment:#e6d5ac;
  --parchment-dark:#d4c194;
  --ink:#1a0f0a;
  --ink-light:#3d2b1f;
  --burgundy:#6b0f1a;
  --burgundy-dark:#4a0a12;
  --gold:#b8860b;
  --gold-light:#daa520;
  --wood:#3e2723;
  --wood-dark:#281815;
  --shadow:rgba(26,15,10,0.4);
  
  --font-gothic:'UnifrakturMaguntia', cursive;
  --font-cinzel:'Cinzel', serif;
  --font-body:'EB Garamond', serif;
}

*{box-sizing:border-box;margin:0;padding:0}

html{background:var(--wood-dark)}

body{
  font-family:var(--font-body);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(135deg, var(--parchment) 0%, var(--parchment-dark) 100%);
  position:relative;
  line-height:1.6;
  font-size:1.05rem;
}

/* Parchment texture */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E"),
    radial-gradient(ellipse at 20% 30%, rgba(139,69,19,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(139,69,19,0.06) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 80%, rgba(160,82,45,0.05) 0%, transparent 45%);
  pointer-events:none;
  z-index:1;
  mix-blend-mode:multiply;
}

/* Frame */
.page-frame{
  position:fixed;
  inset:20px;
  border:2px solid var(--burgundy);
  pointer-events:none;
  z-index:2;
}
.page-frame::before{
  content:"";
  position:absolute;
  inset:4px;
  border:1px solid var(--gold);
  opacity:0.5;
}
.corner{
  position:fixed;
  width:120px;
  height:120px;
  z-index:2;
  pointer-events:none;
  opacity:0.6;
}
.corner-tl{top:10px;left:10px;border-top:3px solid var(--burgundy);border-left:3px solid var(--burgundy);}
.corner-tr{top:10px;right:10px;border-top:3px solid var(--burgundy);border-right:3px solid var(--burgundy);}
.corner-bl{bottom:10px;left:10px;border-bottom:3px solid var(--burgundy);border-left:3px solid var(--burgundy);}
.corner-br{bottom:10px;right:10px;border-bottom:3px solid var(--burgundy);border-right:3px solid var(--burgundy);}
.corner::after{
  content:"❦";
  position:absolute;
  color:var(--burgundy);
  font-size:1.2rem;
}
.corner-tl::after{top:8px;left:8px;}
.corner-tr::after{top:8px;right:8px;}
.corner-bl::after{bottom:8px;left:8px;}
.corner-br::after{bottom:8px;right:8px;}

/* Main container */
.ledger-container{
  position:relative;
  z-index:3;
  max-width:1000px;
  margin:0 auto;
  padding:50px 20px;
  flex:1;
  width:100%;
}

/* Header */
.ledger-header{
  text-align:center;
  margin-bottom:40px;
  padding-bottom:25px;
  border-bottom:3px double var(--burgundy);
}
.ledger-header h1{
  font-family:var(--font-gothic);
  font-size:2.8rem;
  color:var(--burgundy-dark);
  text-shadow:2px 2px 0px rgba(0,0,0,0.1);
  letter-spacing:1px;
  margin-bottom:0.5rem;
}
.ledger-header .subtitle{
  font-family:var(--font-cinzel);
  font-size:0.85rem;
  color:var(--ink-light);
  letter-spacing:3px;
  text-transform:uppercase;
}
.ledger-header .divider{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:1rem;
  margin-top:1rem;
  color:var(--gold);
  font-size:1.2rem;
}
.ledger-header .divider::before,
.ledger-header .divider::after{
  content:"";
  display:block;
  width:80px;
  height:2px;
  background:linear-gradient(to right, transparent, var(--gold), transparent);
}

/* Back link - styled as a return scroll */
.back-link{
  display:inline-flex;
  align-items:center;
  gap:0.5rem;
  font-family:var(--font-cinzel);
  font-size:0.85rem;
  color:var(--burgundy);
  text-decoration:none;
  margin-bottom:2rem;
  padding:0.5rem 1rem;
  border:2px solid var(--burgundy);
  background:rgba(230,213,172,0.4);
  transition:all 0.2s;
  letter-spacing:1px;
}
.back-link:hover{
  background:var(--burgundy);
  color:var(--parchment);
  border-color:var(--gold);
}

/* Table - The Royal Ledger */
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 12px;
  margin-top:1rem;
}

/* Header row */
th{
  font-family:var(--font-cinzel);
  font-size:0.85rem;
  color:var(--burgundy);
  text-transform:uppercase;
  letter-spacing:2px;
  padding:14px 18px;
  text-align:left;
  border-bottom:3px double var(--burgundy);
  background:transparent;
}

/* Data rows styled as individual parchment slips */
td{
  padding:16px 18px;
  background:linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(230,213,172,0.2) 100%);
  border-top:2px solid var(--burgundy);
  border-bottom:2px solid var(--burgundy);
  vertical-align:middle;
  position:relative;
}
/* Left gold bar on each row */
td:first-child{
  border-left:3px solid var(--gold);
  border-top-left-radius:2px;
  border-bottom-left-radius:2px;
}
td:last-child{
  border-right:3px solid var(--burgundy);
  border-top-right-radius:2px;
  border-bottom-right-radius:2px;
}

/* Row hover - like touching an old record */
tr:hover td{
  background:linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(230,213,172,0.4) 100%);
  transform:scale(1.01);
  box-shadow:0 4px 12px var(--shadow);
}
tr{
  transition:all 0.2s ease;
  display:table-row;
}

/* Date cell styling */
td:nth-child(2){
  font-family:var(--font-cinzel);
  font-size:0.85rem;
  color:var(--ink-light);
  white-space:nowrap;
}

/* Yes/No vote counts - styled as tally marks feel */
td:nth-child(3),
td:nth-child(4){
  font-family:var(--font-cinzel);
  font-weight:600;
  color:var(--burgundy-dark);
  text-align:center;
  width:80px;
}
td:nth-child(3)::before{
  content:"✓ ";
  color:var(--gold);
  font-size:0.9rem;
}
td:nth-child(4)::before{
  content:"✗ ";
  color:var(--burgundy);
  font-size:0.9rem;
}

/* Empty state */
#list:empty::before{
  content:"No decrees recorded in the archives.";
  display:block;
  text-align:center;
  padding:3rem;
  font-style:italic;
  color:var(--ink-light);
  font-family:var(--font-body);
}

/* Footer */
.ledger-footer{
  text-align:center;
  padding:1.5rem;
  margin:2rem 40px 40px;
  border-top:3px double var(--burgundy);
  color:var(--ink-light);
  font-family:var(--font-cinzel);
  font-size:0.85rem;
  letter-spacing:1px;
  position:relative;
  z-index:3;
}

/* Responsive */
@media(max-width:768px){
  .ledger-header h1{font-size:2rem;}
  table{border-spacing:0 8px;}
  th{font-size:0.75rem;padding:10px 12px;}
  td{padding:12px 14px;font-size:0.95rem;}
  td:nth-child(2){white-space:normal;}
  .corner{width:60px;height:60px;}
  .page-frame{inset:10px;}
  .ledger-footer{margin:30px 20px 30px;}
}
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="page-frame"></div>

<div class="ledger-container">
  <div class="ledger-header">
    <h1>Archive of Decrees</h1>
    <span class="subtitle">Royal Council Minutes &amp; Past Ballots</span>
    <div class="divider">❦ ❦ ❦</div>
  </div>

  <a href="vote.html" class="back-link">← Return to the Council Chamber</a>

  <table id="list"></table>
</div>

<div class="ledger-footer">Kingdom of Valoria | Recorded by the Clerk of the Council</div>

<script type="module">
import { db, collection, getDocs } from './firebase-config.js';

const list = document.getElementById('list');
list.innerHTML='<tr><th>Decree</th><th>Sealed On</th><th>Aye</th><th>Nay</th></tr>';

const snap = await getDocs(collection(db,'archive'));
snap.docs.sort((a,b)=> b.data().archivedAt - a.data().archivedAt)
         .forEach(d=>{
           const e = d.data();
           const tr = document.createElement('tr');
           tr.innerHTML = `
             <td>${e.title}</td>
             <td>${new Date(e.archivedAt).toLocaleString()}</td>
             <td>${e.results.yes}</td>
             <td>${e.results.no}</td>`;
           list.appendChild(tr);
         });
</script>

</body>
</html>
