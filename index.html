<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Valorian Online Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --parchment:#e6d5ac;
  --parchment-dark:#d4c194;
  --ink:#1a0f0a;
  --ink-light:#3d2b1f;
  --burgundy:#6b0f1a;
  --burgundy-dark:#4a0a12;
  --gold:#b8860b;
  --gold-light:#daa520;
  --wood:#3e2723;
  --wood-dark:#281815;
  --shadow:rgba(26,15,10,0.4);
  
  --font-gothic:'UnifrakturMaguntia', cursive;
  --font-cinzel:'Cinzel', serif;
  --font-body:'EB Garamond', serif;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  background:var(--wood-dark);
}

body{
  font-family:var(--font-body);
  color:var(--ink);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:
    /* parchment base */
    linear-gradient(135deg, var(--parchment) 0%, var(--parchment-dark) 100%);
  position:relative;
}

/* Aged paper texture overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    /* subtle noise/grain */
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E"),
    /* water stains */
    radial-gradient(ellipse at 20% 30%, rgba(139,69,19,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(139,69,19,0.06) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 80%, rgba(160,82,45,0.05) 0%, transparent 45%);
  pointer-events:none;
  z-index:1;
  mix-blend-mode:multiply;
}

/* Corner ornaments */
.corner{
  position:fixed;
  width:120px;
  height:120px;
  z-index:2;
  pointer-events:none;
  opacity:0.6;
}
.corner-tl{top:10px;left:10px;border-top:3px solid var(--burgundy);border-left:3px solid var(--burgundy);}
.corner-tr{top:10px;right:10px;border-top:3px solid var(--burgundy);border-right:3px solid var(--burgundy);}
.corner-bl{bottom:10px;left:10px;border-bottom:3px solid var(--burgundy);border-left:3px solid var(--burgundy);}
.corner-br{bottom:10px;right:10px;border-bottom:3px solid var(--burgundy);border-right:3px solid var(--burgundy);}

/* Inner corner details */
.corner::after{
  content:"❦";
  position:absolute;
  color:var(--burgundy);
  font-size:1.2rem;
}
.corner-tl::after{top:8px;left:8px;}
.corner-tr::after{top:8px;right:8px;}
.corner-bl::after{bottom:8px;left:8px;}
.corner-br::after{bottom:8px;right:8px;}

/* Decorative border frame */
.page-frame{
  position:fixed;
  inset:20px;
  border:2px solid var(--burgundy);
  pointer-events:none;
  z-index:2;
}
.page-frame::before{
  content:"";
  position:absolute;
  inset:4px;
  border:1px solid var(--gold);
  opacity:0.5;
}

/* Header Banner */
header{
  position:relative;
  z-index:3;
  text-align:center;
  padding:2.5rem 1rem 1.5rem;
  border-bottom:3px double var(--burgundy);
  margin:40px 40px 0;
  background:
    linear-gradient(to bottom, rgba(212,193,148,0.3), transparent);
}

header h1{
  font-family:var(--font-gothic);
  font-size:3.2rem;
  color:var(--burgundy-dark);
  text-shadow:2px 2px 0px rgba(0,0,0,0.1);
  letter-spacing:1px;
  line-height:1.1;
}

header .subtitle{
  font-family:var(--font-cinzel);
  font-size:0.95rem;
  color:var(--ink-light);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-top:0.5rem;
  display:block;
}

header .divider{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:1rem;
  margin-top:1rem;
  color:var(--gold);
  font-size:1.2rem;
}
header .divider::before,
header .divider::after{
  content:"";
  display:block;
  width:80px;
  height:2px;
  background:linear-gradient(to right, transparent, var(--gold), transparent);
}

/* Clock - styled as chronicle timestamp */
#clock{
  position:absolute;
  top:1.5rem;
  right:2rem;
  font-family:var(--font-cinzel);
  font-size:0.85rem;
  color:var(--ink-light);
  border:2px solid var(--burgundy);
  padding:0.4rem 0.8rem;
  background:rgba(230,213,172,0.6);
  letter-spacing:1px;
}

/* Main Content */
main{
  position:relative;
  z-index:3;
  flex:1;
  padding:2rem;
  max-width:1200px;
  margin:0 auto;
  width:100%;
}

.section-title{
  font-family:var(--font-cinzel);
  font-size:1.4rem;
  color:var(--burgundy-dark);
  text-align:center;
  margin-bottom:2rem;
  letter-spacing:2px;
  position:relative;
}
.section-title::after{
  content:"";
  display:block;
  width:200px;
  height:2px;
  background:linear-gradient(to right, transparent, var(--burgundy), transparent);
  margin:0.6rem auto 0;
}

/* Grid of Tiles - styled as hanging wooden plaques */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:2rem;
  padding:0 1rem;
}

.tile{
  position:relative;
  background:
    linear-gradient(145deg, var(--wood) 0%, var(--wood-dark) 100%);
  border:3px solid var(--gold);
  border-radius:2px;
  padding:1.8rem 1.2rem 1.4rem;
  text-align:center;
  cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.1),
    0 4px 12px var(--shadow);
  /* Wood grain effect */
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
    linear-gradient(145deg, var(--wood) 0%, var(--wood-dark) 100%);
}

/* Nail/rivet corners */
.tile::before,
.tile::after{
  content:"";
  position:absolute;
  width:8px;
  height:8px;
  background:var(--gold);
  border-radius:50%;
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.5);
}
.tile::before{top:6px;left:6px;}
.tile::after{top:6px;right:6px;}

.tile .rivet-bl,
.tile .rivet-br{
  position:absolute;
  width:8px;
  height:8px;
  background:var(--gold);
  border-radius:50%;
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.5);
  bottom:6px;
}
.tile .rivet-bl{left:6px;}
.tile .rivet-br{right:6px;}

/* Hanging chain effect */
.tile .chain{
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  width:2px;
  height:12px;
  background:linear-gradient(to bottom, var(--gold), var(--wood));
}
.tile .chain::before{
  content:"";
  position:absolute;
  top:-4px;
  left:-3px;
  width:8px;
  height:8px;
  border:2px solid var(--gold);
  border-radius:50%;
  background:transparent;
}

.tile:hover{
  transform:translateY(-4px) scale(1.02);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.1),
    0 8px 24px var(--shadow);
  border-color:var(--gold-light);
}

.tile .icon{
  font-size:2.4rem;
  margin-bottom:0.6rem;
  display:block;
  filter:drop-shadow(1px 1px 1px rgba(0,0,0,0.5));
}

.tile h3{
  font-family:var(--font-cinzel);
  font-size:1.15rem;
  color:var(--parchment);
  margin:0.5rem 0;
  letter-spacing:1px;
  font-weight:600;
}

.tile p{
  font-family:var(--font-body);
  font-size:1rem;
  color:rgba(230,213,172,0.8);
  margin:0;
  font-style:italic;
  line-height:1.3;
}

/* Beta seal */
.badge{
  position:absolute;
  top:-8px;
  right:-8px;
  background:var(--burgundy);
  color:var(--parchment);
  font-family:var(--font-cinzel);
  font-size:0.6rem;
  padding:0.25rem 0.5rem;
  border:2px solid var(--gold);
  transform:rotate(12deg);
  box-shadow:0 2px 6px rgba(0,0,0,0.4);
  letter-spacing:1px;
  text-transform:uppercase;
}

/* External link indicator */
.tile.external .wax-seal{
  position:absolute;
  bottom:8px;
  right:8px;
  width:16px;
  height:16px;
  background:var(--burgundy);
  border-radius:50%;
  opacity:0.7;
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.3);
}
.tile.external .wax-seal::after{
  content:"";
  position:absolute;
  inset:3px;
  border:1px solid var(--gold);
  border-radius:50%;
}

/* Footer */
footer{
  position:relative;
  z-index:3;
  text-align:center;
  padding:1.5rem;
  margin:2rem 40px 40px;
  border-top:3px double var(--burgundy);
  color:var(--ink-light);
  font-family:var(--font-cinzel);
  font-size:0.85rem;
  letter-spacing:1px;
}
footer span{
  color:var(--burgundy);
}

/* Responsive */
@media(max-width:768px){
  header h1{font-size:2.2rem;}
  #clock{position:static;margin-top:1rem;display:inline-block;}
  .grid{grid-template-columns:1fr;gap:1.5rem;}
  .corner{width:60px;height:60px;}
  .page-frame{inset:10px;}
  header,footer{margin:30px 20px 0;}
  footer{margin-bottom:30px;}
}
</style>
</head>
<body>

<!-- Decorative corners -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="page-frame"></div>

<<header>
  <div id="clock"></div>
  <h1>Valorian Online Hub</h1>
  <span class="subtitle">Official Toolbox of the Kingdom</span>
  <div class="divider">❦ ❦ ❦</div>
</header>

<<main id="hub-main">
  <section id="hub-home">
    <h2 class="section-title">Royal Instruments &amp; Scrolls</h2>
    <div class="grid" id="grid"></div>
  </section>
</main>

<<footer>Kingdom of Valoria | &copy; <span id="yr"></span> | By Decree of the Crown</footer>

<script>
const tiles = [
  {emoji:"🍷", title:"Valorka", desc:"Valorian fresh wine", url:"valorka.html", external:false, beta:false},
  {emoji:"📜", title:"Quotes", desc:"Hall of fame and wisdom", url:"quotes.html", external:false, beta:false},
  {emoji:"📖", title:"Learn", desc:"Tomes of knowledge & guides", url:"learn.html", external:false, beta:false},
  {emoji:"📰", title:"Valorian News", desc:"Public announcements & town crier", url:"newspaper-archive.html", external:false, beta:false},
  {emoji:"🗳", title:"Pols", desc:"Statistics & realm data", url:"vote.html", external:false, beta:false},
  {emoji:"⚖", title:"Constitution", desc:"Laws and royal decrees", url:"constitution.html", external:false, beta:false},
  {emoji:"📖", title:"History", desc:"Short simple current History", url:"History.html", external:false, beta:false},
  {emoji:"V", title:"Military", desc:"Military Information", url:"military.html", external:false, beta:false},
  {emoji:"♟", title:"IVCF", desc:"Chess federation & ladders", url:"ivcf.html", external:false, beta:true}
];

const grid = document.getElementById('grid');
tiles.forEach(t=>{
  const div = document.createElement('div');
  div.className = 'tile' + (t.external?' external':'');
  div.innerHTML = `
    <div class="chain"></div>
    <div class="rivet-bl"></div>
    <div class="rivet-br"></div>
    ${t.external?'<div class="wax-seal"></div>':''}
    <span class="icon">${t.emoji}</span>
    <h3>${t.title}${t.beta?'<span class="badge">BETA</span>':''}</h3>
    <p>${t.desc}</p>
  `;
  div.onclick = () => window.open(t.url, '_blank');
  grid.appendChild(div);
});

function tick(){
  const now = new Date();
  document.getElementById('clock').textContent = 
    now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick,60000);
document.getElementById('yr').textContent = new Date().getFullYear();
</script>

</body>
</html>
