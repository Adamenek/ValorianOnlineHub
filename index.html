<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Valorian Online Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap');

:root{
  --parchment:#f4e4bc;
  --parchment-dark:#e8d5a3;
  --ink:#2b1d0e;
  --ink-light:#5c4033;
  --accent:#8b1a1a;
  --accent-gold:#b8860b;
  --border:#6b4423;
  --shadow:rgba(43,29,14,0.25);
  --gap:1.4rem;
  font-family:"Cinzel","Palatino Linotype","Book Antiqua",Palatino,serif;
  font-weight:400;
  letter-spacing:0.6px;
  color:var(--ink);
}

* { box-sizing:border-box; }

body{
  margin:0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,69,19,0.03) 2px, rgba(139,69,19,0.03) 4px),
    linear-gradient(to bottom, #f4e4bc 0%, #e8d5a3 100%);
  background-size:100% 100%, 100% 100%;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
}

/* Parchment edge effect */
body::before{
  content:"";
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  pointer-events:none;
  box-shadow:inset 0 0 80px rgba(107,68,35,0.15);
  border:12px solid transparent;
  border-image:repeating-linear-gradient(45deg, var(--border) 0, var(--border) 10px, var(--parchment-dark) 10px, var(--parchment-dark) 20px) 12;
  z-index:100;
}

a{color:var(--accent);text-decoration:none; transition:color 0.2s;}
a:hover{color:var(--accent-gold);}

/* ===== HEADER ===== */
header{
  background:linear-gradient(to bottom, #e8d5a3, #d4b896);
  border-bottom:3px double var(--border);
  box-shadow:0 4px 12px var(--shadow);
  padding:1.2rem 2rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:relative;
}
header::after{
  content:"✦ ✦ ✦";
  position:absolute;
  bottom:-14px;
  left:50%;
  transform:translateX(-50%);
  background:var(--parchment);
  padding:0 1rem;
  color:var(--border);
  font-size:0.9rem;
  letter-spacing:8px;
}
header h1{
  margin:0;
  font-family:"UnifrakturMaguntia", "Cinzel Decorative", serif;
  font-size:2.2rem;
  color:var(--accent);
  text-shadow:1px 1px 0 var(--parchment-dark);
  letter-spacing:1px;
}
header span{
  display:block;
  font-size:0.85rem;
  color:var(--ink-light);
  font-style:italic;
  margin-top:0.2rem;
  font-family:"Cinzel",serif;
}
.mono{
  font-family:"Courier New",Courier,monospace;
  background:rgba(107,68,35,0.1);
  padding:0.3rem 0.8rem;
  border:1px solid var(--border);
  color:var(--ink);
}

/* ===== MAIN ===== */
main{
  flex:1;
  padding:2.5rem 2rem;
  max-width:1100px;
  margin:auto;
  width:100%;
}
section h2{
  font-family:"UnifrakturMaguntia","Cinzel Decorative",serif;
  font-size:1.8rem;
  color:var(--accent);
  text-align:center;
  margin-bottom:2rem;
  position:relative;
}
section h2::before,
section h2::after{
  content:"❧";
  color:var(--accent-gold);
  margin:0 1rem;
}

/* ===== TILE GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:var(--gap);
}
.tile{
  background:linear-gradient(145deg, #f8ecd5 0%, #e8d5a3 100%);
  border:2px solid var(--border);
  border-radius:2px;
  padding:1.8rem 1.2rem;
  text-align:center;
  transition:all 0.2s ease;
  cursor:pointer;
  position:relative;
  box-shadow:2px 2px 8px var(--shadow);
}
.tile::before{
  content:"";
  position:absolute;
  top:4px; left:4px; right:4px; bottom:4px;
  border:1px solid rgba(107,68,35,0.2);
  pointer-events:none;
}
.tile:hover{
  transform:translateY(-4px) scale(1.02);
  box-shadow:4px 8px 24px var(--shadow);
  border-color:var(--accent);
}
.tile .emoji{
  font-size:2.4rem;
  margin-bottom:0.6rem;
  filter:sepia(0.4) contrast(1.1);
}
.tile h3{
  margin:0.5rem 0 0.3rem;
  font-size:1.15rem;
  font-weight:700;
  font-family:"UnifrakturMaguntia","Cinzel",serif;
  color:var(--accent);
}
.tile p{
  font-size:0.85rem;
  color:var(--ink-light);
  margin:0;
  font-style:italic;
}
.tile.external::after{
  content:"⧉";
  position:absolute;
  top:0.6rem;
  right:0.8rem;
  font-size:0.85rem;
  opacity:0.5;
  color:var(--border);
}
.badge{
  display:inline-block;
  background:var(--accent);
  color:var(--parchment);
  padding:0.15rem 0.4rem;
  border-radius:2px;
  font-size:0.65rem;
  margin-left:0.4rem;
  font-family:"Cinzel",serif;
  border:1px solid var(--accent-gold);
  box-shadow:1px 1px 3px var(--shadow);
}

/* ===== FOOTER ===== */
footer{
  text-align:center;
  padding:1.5rem;
  font-size:0.8rem;
  color:var(--ink-light);
  border-top:3px double var(--border);
  background:linear-gradient(to top, #e8d5a3, #f4e4bc);
  position:relative;
  font-style:italic;
}
footer::before{
  content:"❦";
  display:block;
  font-size:1.2rem;
  color:var(--accent-gold);
  margin-bottom:0.3rem;
}

/* ===== RESPONSIVE ===== */
@media (max-width:600px){
  header{flex-direction:column; gap:0.8rem; text-align:center;}
  header h1{font-size:1.7rem;}
  main{padding:1.5rem 1rem;}
  .grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<<header>
  <div>
    <h1>Valorian Online Hub</h1>
    <span>Official toolbox of the Kingdom</span>
  </div>
  <div id="clock" class="mono"></div>
</header>

<<main id="hub-main">
  <section id="hub-home">
    <h2>Quick-Tools</h2>
    <div class="grid" id="grid"></div>
  </section>
</main>

<<footer>Kingdom of Valoria | &copy; <span id="yr"></span></footer>

<script>
const tiles = [
  {emoji:"🍷", title:"Valorka", desc:"Valorian fresh wine", url:"valorka.html", external:false, beta:false},
  {emoji:"❓", title:"Speed Quiz", desc:"How fast and smart are you", url:"speedquiz.html", external:false, beta:false},
  {emoji:"🗣️", title:"Quotes", desc:"Hall of fame", url:"quotes.html", external:false, beta:false},
  {emoji:"📚", title:"Learn", desc:"Educational resources & guides", url:"learn.html", external:false, beta:false},
  {emoji:"🤖", title:"V.ai", desc:"Valorian Intelligence", url:"vai.html", external:false, beta:true},
  {emoji:"📰", title:"Valorian News", desc:"Public announcements & comments", url:"newspaper-archive.html", external:false, beta:false},
  {emoji:"🗳", title:"Pols", desc:"Statistics", url:"vote.html", external:false, beta:false},
  {emoji:"🏘", title:"Valoria Map", desc:"Interactive Map", url:"CountryMap.html", external:false, beta:true},
  {emoji:"📜", title:"Constitution", desc:"Laws and Constitution", url:"constitution.html", external:false, beta:false},
  {emoji:"♟", title:"IVCF", desc:"Chess federation ladders & rating calc", url:"ivcf.html", external:false, beta:true}
];

const grid = document.getElementById('grid');
tiles.forEach(t=>{
  const div = document.createElement('div');
  div.className = 'tile' + (t.external?' external':'');
  div.innerHTML = `<div class="emoji">${t.emoji}</div><h3>${t.title}${t.beta?'<span class="badge">BETA</span>':''}</h3><p>${t.desc}</p>`;
  div.onclick = () => window.open(t.url, '_blank');
  grid.appendChild(div);
});

function tick(){
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick,60000);
document.getElementById('yr').textContent = new Date().getFullYear();
</script>
</body>
</html>
